apiVersion: apps/v1
kind: Deployment
metadata:
  name: 1router-frontend
  namespace: 1router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 1router-frontend
  template:
    metadata:
      labels:
        app: 1router-frontend
    spec:
      containers:
      - name: 1router-frontend
        image: ghcr.io/1router/1router-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
