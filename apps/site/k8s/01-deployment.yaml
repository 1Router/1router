apiVersion: apps/v1
kind: Deployment
metadata:
  name: 1router-frontend
  namespace: 1router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: 1router-frontend
  template:
    metadata:
      labels:
        app: 1router-frontend
    spec:
      containers:
      - name: 1router-frontend
        image: ghcr.io/1router/1router-site:main
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 3
# ====== TODO before production ========================================
# - Bump replicas ≥ 2 and add podAntiAffinity / PodDisruptionBudget / HPA.
#   With imagePullPolicy: Always, every new :main image digest triggers
#   a rolling restart on the next pod restart; rolling adds extra capacity
#   while old pods drain, so two replicas is the minimum to keep traffic
#   flowing through a redeploy.
# - For instant manual rollback without rebuilding, edit image: above to
#   one of the immutable tags already published by apps/site/build.sh:
